<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Generator | PragyanAI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">✦</span><span>PragyanAI</span></a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="study-planner.html">Study Planner</a>
        <a href="quiz-generator.html" class="active">Quiz Generator</a>
        <a href="ai-assistant.html">AI Assistant</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
    </header>

    <main>
      <section class="section">
        <h2>Generate a quiz</h2>
        <form id="quiz-form">
          <div class="form-row">
            <label for="quiz-topic">Topic</label>
            <input id="quiz-topic" placeholder="e.g. Photosynthesis" />
          </div>
          <div class="form-row">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
          <button class="btn btn-primary" type="submit">Generate quiz</button>
        </form>
        <div id="quiz-output" class="output-box" style="margin-top: 1rem;"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 PragyanAI.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
