<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | PragyanAI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">✦</span><span>PragyanAI</span></a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="study-planner.html">Study Planner</a>
        <a href="quiz-generator.html">Quiz Generator</a>
        <a href="ai-assistant.html">AI Assistant</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
    </header>

    <main>
      <section class="section">
        <h2>Contact us</h2>
        <div class="grid-2">
          <form>
            <div class="form-row">
              <label for="name">Name</label>
              <input id="name" placeholder="Your name" />
            </div>
            <div class="form-row">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="email@example.com" />
            </div>
            <div class="form-row">
              <label for="message">Message</label>
              <textarea id="message" placeholder="Tell us what you want to improve"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Send message</button>
          </form>
          <div>
            <h3>Support details</h3>
            <ul class="list">
              <li>Email: hello@studyflowai.com</li>
              <li>Office: Online support available 24/7</li>
              <li>Feedback: We welcome ideas for new features</li>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 PragyanAI.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
